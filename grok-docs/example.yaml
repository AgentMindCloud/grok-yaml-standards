# .grok/grok-docs.yaml
version: "2.0.0"
author: "@JanSol0s"
compatibility:
  - "grok-install.yaml@1.0+"
  - "grok@2026.4+"
  - "grok-yaml-standards@2.0+"

docs:
  AutoREADME:
    target: "README.md"
    sections:
      - hero
      - features
      - installation
      - quickstart
      - magic_triggers
    style: "exciting-professional"
    update_on: ["push", "pr_merged"]

  APIDocs:
    target: "docs/API.md"
    sections: ["endpoints", "examples", "auth"]
    style: "technical-clean"
    include_code_samples: true
