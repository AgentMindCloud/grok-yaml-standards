<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.1/github-markdown-dark.css">
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    .markdown-body {
      box-sizing: border-box;
      max-width: 980px;
      margin: 0 auto;
      padding: 48px 24px 96px;
      background: transparent;
    }
    .site-footer {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
      border-top: 1px solid #21262d;
      color: #8b949e;
      font-size: 14px;
      text-align: center;
    }
    .site-footer a { color: #58a6ff; text-decoration: none; }
    .site-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <article class="markdown-body">
    {{ content }}
  </article>
  <footer class="site-footer">
    <a href="https://github.com/agentmindcloud/{{ site.baseurl | remove: '/' }}">View on GitHub</a>
    &middot;
    <a href="{{ site.baseurl }}/">Home</a>
  </footer>
</body>
</html>
