# .grok/grok-agent.yaml
version: "1.0.0"
author: "@JanSol0s"
compatibility:
  - "grok-install.yaml@1.0+"
  - "grok@2026.4+"

agent:
  name: "CodeHelper"
  description: "Persistent coding assistant that remembers project state"
  tools:
    - read_file
    - write_file
    - run_test
  memory: "persistent"
  max_turns: 50
