# .grok/grok-update.yaml
version: "1.2.0"
author: "@JanSol0s"
compatibility:
  - "grok-install.yaml@1.0+"
  - "grok@2026.4+"
  - "grok-yaml-standards@1.2+"

updates:
  KnowledgeBase:
    description: "Keep project knowledge fresh"
    sources:
      - "README.md"
      - "docs/"
      - "CHANGELOG.md"
    frequency: "weekly"
    auto_commit: false
    actions:
      - "refresh_links"
      - "update_stats"
      - "pull_latest_research"

  DependencyCheck:
    description: "Auto-update dependencies & security patches"
    sources:
      - "package.json"
      - "requirements.txt"
    frequency: "daily"
    auto_commit: true
    require_approval: true
