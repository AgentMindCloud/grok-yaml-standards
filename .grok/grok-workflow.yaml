# .grok/grok-workflow.yaml
version: "1.2.0"
author: "@JanSol0s"
compatibility:
  - "grok-install.yaml@1.0+"
  - "grok@2026.4+"
  - "grok-yaml-standards@1.2+"

workflows:
  ReleasePipeline:
    description: "One-click release from PR to X announcement"
    trigger: "@grok run workflow:ReleasePipeline"
    steps:
      - name: "run-tests"
        action: "grok-test"
        input: "all"
      - name: "generate-docs"
        action: "grok-docs"
      - name: "create-release-notes"
        action: "summarize_changes"
      - name: "post-to-x"
        action: "publish_thread"
        template: "viral_thread"

  ContentPipeline:
    description: "Turn idea → viral X thread in one command"
    trigger: "@grok run workflow:ContentPipeline"
    steps:
      - name: "brainstorm"
        action: "grok-prompts"
        prompt: "product_idea"
      - name: "write-thread"
        action: "grok-prompts"
        prompt: "viral_thread"
      - name: "schedule"
        action: "post_thread"
